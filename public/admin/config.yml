backend:
  name: git-gateway
  branch: main

media_folder: "public/uploads"
public_folder: "/uploads"

publish_mode: editorial_workflow

collections:
  - name: "media"
    label: "Media"
    folder: "src/content/media"
    create: true
    identifier_field: "id"

    fields:
      - { label: "ID", name: "id", widget: "uuid" }
      - { label: "Title", name: "title", widget: "string", required: false }
      - { label: "Subtitle", name: "subtitle", widget: "string", required: false }
      - { label: "Year", name: "year", widget: "number", required: false }
      - { label: "Vimeo ID", name: "vimeoId", widget: "string", required: false }
      - { label: "Cover", name: "cover", widget: "image" }
      - { label: "Homepage", name: "homepage", widget: "boolean", default: false }
      - { label: "Type", name: "type", widget: "select", options: ["video_and_motion", "photography", "animation"] }

